<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MegaNet Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins',sans-serif;
background:#f8fafc;
}
</style>
</head>

<body>

<!-- TOP NAVBAR -->
<nav class="bg-blue-800 text-white p-4 flex justify-between items-center">

<div class="flex items-center gap-3">
<img src="assets/logo/meganet-logo.png" class="h-10">
<h1 class="text-xl font-bold">MegaNet</h1>
</div>

<div>
<button id="logoutBtn"
class="bg-red-500 px-4 py-2 rounded-lg">
Logout
</button>
</div>

</nav>

<!-- CONTENT -->
<div class="max-w-7xl mx-auto p-6">

<!-- WELCOME -->
<div class="bg-white rounded-2xl shadow p-6 mb-6">

<h2 id="welcomeName"
class="text-3xl font-bold text-blue-800">
Welcome
</h2>

<p class="text-gray-500">
MegaNet Digital Services Dashboard
</p>

</div>

<!-- WALLET -->
<div class="grid md:grid-cols-3 gap-6 mb-6">

<div class="bg-blue-800 text-white p-6 rounded-2xl">

<p>Wallet Balance</p>

<h3 id="walletBalance"
class="text-4xl font-bold mt-3">
₦0.00
</h3>

</div>

<div class="bg-green-500 text-white p-6 rounded-2xl">

<p>Total Transactions</p>

<h3 class="text-4xl font-bold mt-3">
0
</h3>

</div>

<div class="bg-cyan-500 text-white p-6 rounded-2xl">

<p>Referral Earnings</p>

<h3 class="text-4xl font-bold mt-3">
₦0
</h3>

</div>

</div>

<!-- QUICK ACTIONS -->

<h2 class="text-2xl font-bold mb-4">
Quick Actions
</h2>

<div class="grid md:grid-cols-3 gap-6">

<a href="pages/buy-data.html"
class="bg-white p-6 rounded-xl shadow hover:shadow-lg">

<h3 class="text-xl font-bold">
📱 Buy Data
</h3>

</a>

<a href="pages/airtime.html"
class="bg-white p-6 rounded-xl shadow hover:shadow-lg">

<h3 class="text-xl font-bold">
☎ Airtime
</h3>

</a>

<a href="pages/electricity.html"
class="bg-white p-6 rounded-xl shadow hover:shadow-lg">

<h3 class="text-xl font-bold">
⚡ Electricity
</h3>

</a>

<a href="pages/cabletv.html"
class="bg-white p-6 rounded-xl shadow hover:shadow-lg">

<h3 class="text-xl font-bold">
📺 TV Subscription
</h3>

</a>

<a href="pages/wifi.html"
class="bg-white p-6 rounded-xl shadow hover:shadow-lg">

<h3 class="text-xl font-bold">
🌐 MegaNet WiFi
</h3>

</a>

<a href="pages/fund-wallet.html"
class="bg-white p-6 rounded-xl shadow hover:shadow-lg">

<h3 class="text-xl font-bold">
💰 Fund Wallet
</h3>

</a>

</div>

<!-- TRANSACTIONS -->

<div class="mt-10 bg-white rounded-2xl shadow p-6">

<h2 class="text-2xl font-bold mb-4">
Recent Transactions
</h2>

<table class="w-full">

<thead>

<tr class="border-b">

<th class="text-left py-2">Date</th>
<th class="text-left py-2">Service</th>
<th class="text-left py-2">Amount</th>
<th class="text-left py-2">Status</th>

</tr>

</thead>

<tbody id="transactionsTable">

<tr>
<td colspan="4" class="py-4 text-gray-500">
No transactions yet
</td>
</tr>

</tbody>

</table>

</div>

</div>

<script type="module">

import { supabase } from "./js/supabase.js";

const welcomeName =
document.getElementById(
"welcomeName"
);

const walletBalance =
document.getElementById(
"walletBalance"
);

/* CHECK SESSION */

const {
data:{session}
}
=
await supabase.auth.getSession();

if(!session){

window.location.href=
"login.html";

throw new Error(
"No Session"
);

}

/* GET PROFILE */

const user =
session.user;

const {
data,
error
}
=
await supabase
.from(
"profiles"
)
.select("*")
.eq(
"id",
user.id
)
.single();

if(error){

console.error(error);

}

/* DISPLAY */

if(data){

welcomeName.innerHTML =
`Welcome, ${data.full_name}`;

walletBalance.innerHTML =
`₦${Number(
data.wallet_balance || 0
).toLocaleString()}`;

}

/* LOGOUT */

document
.getElementById(
"logoutBtn"
)
.addEventListener(
"click",
async()=>{

await supabase
.auth
.signOut();

window.location.href=
"login.html";

}

);

</script>
</body>
</html>
