<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>MegaNet Register</title>

<script src="https://cdn.tailwindcss.com"></script>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:
linear-gradient(
135deg,
#0066B3,
#00BFFF
);
}

</style>

</head>

<body
class="min-h-screen flex items-center justify-center p-4">

<div
class="bg-white w-full max-w-md rounded-2xl shadow-2xl p-8">

<div class="text-center">

<img
src="assets/logo/meganet-logo.png"
class="h-20 mx-auto mb-4">

<h1
class="text-3xl font-bold text-blue-800">

Create Account

</h1>

<p class="text-gray-500">

Join MegaNet Today

</p>

</div>


<form
id="registerForm"
class="space-y-4 mt-6">

<input
id="fullName"
type="text"
required
placeholder="Full Name"
class="w-full p-3 border rounded-lg">

<input
id="username"
type="text"
required
placeholder="Username"
class="w-full p-3 border rounded-lg">

<input
id="phone"
type="tel"
required
placeholder="Phone Number"
class="w-full p-3 border rounded-lg">

<input
id="email"
type="email"
required
placeholder="Email Address"
class="w-full p-3 border rounded-lg">

<input
id="password"
type="password"
required
placeholder="Password"
class="w-full p-3 border rounded-lg">

<input
id="referral"
type="text"
placeholder="Referral Code"
class="w-full p-3 border rounded-lg">

<button
type="submit"
class="w-full bg-blue-700 text-white py-3 rounded-lg">

Create Account

</button>

</form>


<p class="text-center mt-5">

Already have account?

<a
href="login.html"
class="text-blue-700 font-bold">

Login

</a>

</p>


<div
id="message"
class="mt-4 text-center">
</div>

</div>


<script type="module">

import {
auth,
db
}
from "./js/firebase-config.js";

import {
createUserWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
doc,
setDoc,
serverTimestamp
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


window.addEventListener(
"DOMContentLoaded",
()=>{

const form =
document.getElementById(
"registerForm"
);

const message =
document.getElementById(
"message"
);

form.addEventListener(
"submit",
async(e)=>{

e.preventDefault();

try{

message.innerHTML=
"Creating account...";

const fullName =
document.getElementById(
"fullName"
).value.trim();

const username =
document.getElementById(
"username"
).value.trim();

const phone =
document.getElementById(
"phone"
).value.trim();

const email =
document.getElementById(
"email"
).value.trim();

const password =
document.getElementById(
"password"
).value;

const referral =
document.getElementById(
"referral"
).value.trim();

console.log(
"Starting Auth"
);

const result =
await createUserWithEmailAndPassword(
auth,
email,
password
);

const user =
result.user;

console.log(
"Auth Success"
);

console.log(
"Writing to Firestore"
);

await setDoc(

doc(
db,
"users",
user.uid
),

{

fullName,

username,

phone,

email,

referralCode:
referral || "",

walletBalance:0,

role:"customer",

status:"active",

createdAt:
serverTimestamp()

}

);

console.log(
"Firestore success"
);

message.innerHTML=
"<span class='text-green-600 font-bold'>Account Created Successfully</span>";

setTimeout(()=>{

window.location.href=
"login.html";

},1500);

}catch(error){

console.error(error);

message.innerHTML=
`<span class='text-red-600'>${error.message}</span>`;

}

}

);

}

);

</script>

</body>
</html>
