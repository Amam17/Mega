<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>MegaNet Register</title>

<script src="https://cdn.tailwindcss.com"></script>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:
linear-gradient(
135deg,
#0066B3,
#00BFFF
);
}

</style>

</head>

<body
class="min-h-screen flex items-center justify-center p-4">

<div
class="bg-white w-full max-w-md rounded-2xl shadow-2xl p-8">

<div class="text-center">

<img
src="assets/logo/meganet-logo.png"
class="h-20 mx-auto mb-4">

<h1
class="text-3xl font-bold text-blue-800">

Create Account

</h1>

<p class="text-gray-500">

Join MegaNet Today

</p>

</div>


<form
id="registerForm"
class="space-y-4 mt-6">

<input
id="fullName"
type="text"
required
placeholder="Full Name"
class="w-full p-3 border rounded-lg">

<input
id="username"
type="text"
required
placeholder="Username"
class="w-full p-3 border rounded-lg">

<input
id="phone"
type="tel"
required
placeholder="Phone Number"
class="w-full p-3 border rounded-lg">

<input
id="email"
type="email"
required
placeholder="Email Address"
class="w-full p-3 border rounded-lg">

<input
id="password"
type="password"
required
placeholder="Password"
class="w-full p-3 border rounded-lg">

<input
id="referral"
type="text"
placeholder="Referral Code"
class="w-full p-3 border rounded-lg">

<button
type="submit"
class="w-full bg-blue-700 text-white py-3 rounded-lg">

Create Account

</button>

</form>


<p class="text-center mt-5">

Already have account?

<a
href="login.html"
class="text-blue-700 font-bold">

Login

</a>

</p>

<div
id="message"
class="mt-4 text-center">
</div>

</div>

<script
type="module"
src="./js/register.js">
</script>
  
</body>
</html>
